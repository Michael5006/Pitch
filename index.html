<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagrama UML</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:          #0b0b15;
  --surface:     #131320;
  --surface2:    #1a1a2c;
  --border:      #22223a;
  --border-hi:   #c49a38;
  --amber:       #c49a38;
  --amber-bg:    rgba(196,154,56,0.10);
  --amber-glow:  rgba(196,154,56,0.35);
  --violet:      #7c6fe0;
  --violet-bg:   rgba(124,111,224,0.15);
  --text:        #e2e2f0;
  --text-dim:    #7a7a9a;
  --text-muted:  #44445a;
  --method:      rgba(196,154,56,0.75);
  --line-conn:   #c49a38;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Syne', sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
  height: 100vh;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: radial-gradient(circle, rgba(120,120,200,0.07) 1px, transparent 1px);
  background-size: 26px 26px;
  pointer-events: none;
  z-index: 0;
}

/* ── VIEWPORT & CANVAS ────────────────────────── */
#viewport {
  position: fixed;
  inset: 0;
  z-index: 1;
  cursor: default;
}
#viewport.pannable { cursor: grab; }
#viewport.panning  { cursor: grabbing; }

#canvas {
  position: absolute;
  width: 1500px;
  height: 950px;
  transform-origin: 0 0;
}

/* ── SVG CONNECTIONS ──────────────────────────── */
#svg-layer {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  overflow: visible;
}

/* ── CLASS BOXES ──────────────────────────────── */
.class-box {
  position: absolute;
  width: 210px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 7px;
  overflow: hidden;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.45s ease, border-color 0.45s ease, box-shadow 0.45s ease;
}

.class-box.visible   { opacity: 1; pointer-events: auto; }
.class-box.active    {
  border-color: var(--border-hi);
  box-shadow: 0 0 0 1px var(--border-hi), 0 0 28px var(--amber-glow), 0 6px 24px rgba(0,0,0,0.65);
}
.class-box.revealed  { opacity: 0.42; }

.class-header {
  padding: 10px 13px 9px;
  background: var(--amber-bg);
  border-bottom: 1px solid var(--border);
}
.class-box.active .class-header { background: rgba(196,154,56,0.14); }

.class-stereotype {
  display: block;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 8.5px;
  color: var(--amber);
  opacity: 0.7;
  letter-spacing: 0.06em;
  margin-bottom: 3px;
}

.class-name {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12.5px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.01em;
}
.class-box.abstract .class-name { font-style: italic; }

.class-section {
  padding: 7px 13px;
  border-bottom: 1px solid rgba(34,34,58,0.55);
}
.class-section:last-child { border-bottom: none; }

.class-member {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10.5px;
  color: var(--text-dim);
  line-height: 1.85;
}
.class-member.is-method { color: var(--method); }

/* ── LEFT PANEL ───────────────────────────────── */
#panel {
  position: fixed;
  top: 22px;
  left: 22px;
  width: 350px;
  background: rgba(19,19,32,0.97);
  border: 1px solid var(--border);
  border-radius: 11px;
  z-index: 200;
  backdrop-filter: blur(18px);
  box-shadow: 0 24px 60px rgba(0,0,0,0.65);
  max-height: calc(100vh - 110px);
  overflow-y: auto;
  transition: transform 0.5s cubic-bezier(0.16,1,0.3,1), opacity 0.4s;
}
#panel.hidden { transform: translateX(-390px); opacity: 0; pointer-events: none; }
#panel::-webkit-scrollbar { width: 3px; }
#panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.panel-topbar {
  height: 3px;
  background: linear-gradient(90deg, var(--amber), rgba(196,154,56,0.2));
  border-radius: 11px 11px 0 0;
}

.panel-body { padding: 22px 24px 24px; }

.panel-meta {
  display: flex;
  align-items: center;
  gap: 11px;
  margin-bottom: 18px;
}

.panel-num {
  width: 34px;
  height: 34px;
  border-radius: 7px;
  background: var(--amber-bg);
  border: 1px solid rgba(196,154,56,0.45);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 14px;
  font-weight: 600;
  color: var(--amber);
  flex-shrink: 0;
}

.panel-concept {
  font-size: 9.5px;
  font-weight: 700;
  color: var(--amber);
  text-transform: uppercase;
  letter-spacing: 0.13em;
}

.panel-step-of {
  font-size: 10px;
  color: var(--text-muted);
  margin-top: 3px;
}

.panel-content { }

.panel-title {
  font-size: 21px;
  font-weight: 800;
  color: var(--text);
  margin-bottom: 10px;
  letter-spacing: -0.025em;
  line-height: 1.15;
}

.panel-desc {
  font-size: 13px;
  color: var(--text-dim);
  line-height: 1.75;
  margin-bottom: 18px;
}

.panel-section-label {
  font-size: 9px;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.14em;
  margin-bottom: 9px;
}

.panel-points {
  list-style: none;
  margin-bottom: 18px;
}
.panel-points li {
  font-size: 12.5px;
  color: var(--text-dim);
  padding: 5px 0 5px 16px;
  position: relative;
  line-height: 1.55;
  border-bottom: 1px solid rgba(34,34,58,0.5);
}
.panel-points li:last-child { border-bottom: none; }
.panel-points li::before {
  content: '';
  position: absolute;
  left: 0;
  top: 11px;
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--amber);
  opacity: 0.55;
}

.panel-relations-area {
  padding-top: 14px;
  border-top: 1px solid var(--border);
}

.rel-chip {
  display: inline-block;
  padding: 3px 9px;
  background: var(--violet-bg);
  border: 1px solid rgba(124,111,224,0.35);
  border-radius: 4px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  color: var(--violet);
  margin: 3px 3px 3px 0;
}

.panel-kbd {
  margin-top: 18px;
  padding-top: 12px;
  border-top: 1px solid var(--border);
  font-size: 10px;
  color: var(--text-muted);
  display: flex;
  gap: 14px;
}
.kbd-key {
  display: inline-block;
  padding: 1px 6px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 3px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  color: var(--text-dim);
  margin-right: 3px;
}

/* ── BOTTOM CONTROLS ──────────────────────────── */
#controls {
  position: fixed;
  bottom: 22px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  gap: 14px;
  background: rgba(19,19,32,0.97);
  border: 1px solid var(--border);
  border-radius: 100px;
  padding: 10px 20px;
  z-index: 200;
  backdrop-filter: blur(18px);
  box-shadow: 0 10px 40px rgba(0,0,0,0.55);
}

.ctrl-btn {
  width: 38px; height: 38px;
  border-radius: 50%;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-dim);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-size: 15px;
  transition: all 0.2s;
  line-height: 1;
}
.ctrl-btn:hover:not(:disabled) { border-color: var(--amber); color: var(--amber); background: var(--amber-bg); }
.ctrl-btn:disabled { opacity: 0.18; cursor: not-allowed; }

.ctrl-info { text-align: center; min-width: 130px; }
.ctrl-count {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  font-weight: 500;
  color: var(--amber);
  letter-spacing: 0.05em;
}
.ctrl-name { font-size: 12px; color: var(--text-dim); margin-top: 2px; }

.ctrl-bar {
  width: 110px;
  height: 3px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
}
.ctrl-bar-fill {
  height: 100%;
  background: var(--amber);
  border-radius: 3px;
  transition: width 0.45s cubic-bezier(0.16,1,0.3,1);
}

/* ── TOP RIGHT ────────────────────────────────── */
#top-btns {
  position: fixed;
  top: 22px;
  right: 22px;
  display: flex;
  gap: 8px;
  z-index: 200;
}
.top-btn {
  padding: 9px 17px;
  border-radius: 7px;
  border: 1px solid var(--border);
  background: rgba(19,19,32,0.97);
  color: var(--text-dim);
  font-family: 'Syne', sans-serif;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  backdrop-filter: blur(12px);
  letter-spacing: 0.01em;
}
.top-btn:hover { border-color: var(--amber); color: var(--amber); }
.top-btn.on   { border-color: var(--amber); color: var(--amber); background: var(--amber-bg); }

/* ── LEGEND ───────────────────────────────────── */
#legend {
  position: fixed;
  bottom: 22px;
  right: 22px;
  background: rgba(19,19,32,0.97);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 18px;
  z-index: 200;
  backdrop-filter: blur(18px);
  box-shadow: 0 10px 40px rgba(0,0,0,0.55);
  min-width: 190px;
}

.legend-title {
  font-size: 9px;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.14em;
  margin-bottom: 11px;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}
.legend-item:last-child { margin-bottom: 0; }
.legend-item span:last-child {
  font-size: 11px;
  color: var(--text-dim);
  font-family: 'IBM Plex Mono', monospace;
  white-space: nowrap;
}
.legend-item svg { flex-shrink: 0; }

.leg-box-abstract {
  width: 60px;
  border: 1px solid var(--border-hi);
  border-radius: 3px;
  background: var(--amber-bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-family: 'IBM Plex Mono', monospace;
  padding: 3px 4px;
  gap: 2px;
}
.leg-stereo {
  font-style: italic;
  font-size: 7.5px;
  color: var(--amber);
  opacity: 0.7;
  white-space: nowrap;
  line-height: 1.2;
}
.leg-classname {
  font-size: 9px;
  color: var(--text-dim);
  font-style: italic;
  white-space: nowrap;
  line-height: 1.2;
}

/* ── PANEL ANIMATION ──────────────────────────── */
@keyframes panelReveal {
  from { opacity:0; transform:translateY(7px); }
  to   { opacity:1; transform:translateY(0); }
}
.panel-anim { animation: panelReveal 0.35s ease forwards; }
</style>
</head>
<body>

<!-- VIEWPORT -->
<div id="viewport">
  <div id="canvas">
    <svg id="svg-layer">
      <defs>
        <!-- Arrow (open arrowhead at target) -->
        <marker id="m-arrow" markerWidth="10" markerHeight="8"
                refX="9" refY="4" orient="auto" markerUnits="userSpaceOnUse">
          <path d="M0,0 L10,4 L0,8 z" fill="#c49a38"/>
        </marker>
        <!-- Inheritance (hollow triangle at parent) -->
        <marker id="m-inherit" markerWidth="13" markerHeight="10"
                refX="12" refY="5" orient="auto" markerUnits="userSpaceOnUse">
          <path d="M0,0 L12,5 L0,10 z" fill="none" stroke="#c49a38" stroke-width="1.5"/>
        </marker>
        <!-- Composition diamond at source -->
        <marker id="m-diamond" markerWidth="14" markerHeight="10"
                refX="1" refY="5" orient="auto" markerUnits="userSpaceOnUse">
          <path d="M1,5 L7,1 L13,5 L7,9 z" fill="#c49a38"/>
        </marker>
      </defs>
    </svg>
    <!-- class boxes injected by JS -->
  </div>
</div>

<!-- PANEL -->
<div id="panel">
  <div class="panel-topbar"></div>
  <div class="panel-body">
    <div class="panel-meta">
      <div class="panel-num" id="pNum">01</div>
      <div>
        <div class="panel-concept" id="pConcept">-</div>
        <div class="panel-step-of" id="pStepOf">Paso 1 de 11</div>
      </div>
    </div>
    <div id="panel-content" class="panel-content">
      <div class="panel-title" id="pTitle">-</div>
      <div class="panel-desc" id="pDesc">-</div>
      <div class="panel-section-label">Puntos clave</div>
      <ul class="panel-points" id="pPoints"></ul>
      <div class="panel-relations-area" id="pRelArea">
        <div class="panel-section-label" style="margin-bottom:9px">Relaciones</div>
        <div id="pRelChips"></div>
      </div>
    </div>
    <div class="panel-kbd">
      <span><span class="kbd-key">←</span><span class="kbd-key">→</span> navegar</span>
      <span><span class="kbd-key">Esc</span> vista libre</span>
    </div>
  </div>
</div>

<!-- CONTROLS -->
<div id="controls">
  <button class="ctrl-btn" id="btnPrev" onclick="prevStep()" disabled>&#8592;</button>
  <div class="ctrl-info">
    <div class="ctrl-count" id="ctrlCount">01 / 11</div>
    <div class="ctrl-name" id="ctrlName">-</div>
  </div>
  <div class="ctrl-bar"><div class="ctrl-bar-fill" id="ctrlFill" style="width:9%"></div></div>
  <button class="ctrl-btn" id="btnNext" onclick="nextStep()">&#8594;</button>
</div>

<!-- LEGEND -->
<div id="legend">
  <div class="legend-title">Leyenda</div>
  <div class="legend-item">
    <svg width="38" height="14" viewBox="0 0 38 14">
      <line x1="2" y1="7" x2="30" y2="7" stroke="#c49a38" stroke-width="1.5" marker-end="url(#leg-arrow)"/>
      <defs>
        <marker id="leg-arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="userSpaceOnUse">
          <path d="M0,0 L10,4 L0,8 z" fill="#c49a38"/>
        </marker>
      </defs>
    </svg>
    <span>Asociacion / Navegacion</span>
  </div>
  <div class="legend-item">
    <svg width="38" height="14" viewBox="0 0 38 14">
      <defs>
        <marker id="leg-inherit" markerWidth="13" markerHeight="10" refX="12" refY="5" orient="auto" markerUnits="userSpaceOnUse">
          <path d="M0,0 L12,5 L0,10 z" fill="none" stroke="#c49a38" stroke-width="1.5"/>
        </marker>
      </defs>
      <line x1="2" y1="7" x2="30" y2="7" stroke="#c49a38" stroke-width="1.5" marker-end="url(#leg-inherit)"/>
    </svg>
    <span>Herencia (extends)</span>
  </div>
  <div class="legend-item">
    <svg width="38" height="14" viewBox="0 0 38 14">
      <defs>
        <marker id="leg-diamond" markerWidth="14" markerHeight="10" refX="1" refY="5" orient="auto" markerUnits="userSpaceOnUse">
          <path d="M1,5 L7,1 L13,5 L7,9 z" fill="#c49a38"/>
        </marker>
        <marker id="leg-arr2" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="userSpaceOnUse">
          <path d="M0,0 L10,4 L0,8 z" fill="#c49a38"/>
        </marker>
      </defs>
      <line x1="4" y1="7" x2="32" y2="7" stroke="#c49a38" stroke-width="1.5" marker-start="url(#leg-diamond)" marker-end="url(#leg-arr2)"/>
    </svg>
    <span>Composicion (ciclo de vida)</span>
  </div>
  <div class="legend-item">
    <svg width="38" height="14" viewBox="0 0 38 14">
      <line x1="2" y1="7" x2="36" y2="7" stroke="#c49a38" stroke-width="1.5" stroke-dasharray="4 3"/>
    </svg>
    <span>Asociacion N:M</span>
  </div>
  <div class="legend-item abstract-sample">
    <div class="leg-box-abstract">
      <span class="leg-stereo">&laquo;abstract&raquo;</span>
      <span class="leg-classname">NombreClase</span>
    </div>
    <span>Clase abstracta</span>
  </div>
</div>

<!-- TOP BUTTONS -->
<div id="top-btns">
  <button class="top-btn on" id="btnPres" onclick="setMode('presentation')">Presentacion</button>
  <button class="top-btn"   id="btnFree" onclick="setMode('free')">Vista general</button>
</div>

<script>
/* ══════════════════════════════════════════════
   DATA
══════════════════════════════════════════════ */

const CLASSES = {
  Cliente: {
    x:520, y:30,
    attrs:   ['-int id','-String nombre','-String apellido','-String email','-String telefono'],
    methods: ['+actualizar() void','+login() boolean']
  },
  Direccion: {
    x:900, y:30,
    attrs:   ['-int id','-String calle','-String ciudad','-String codigoPostal','-String pais'],
    methods: []
  },
  Carrito_compra: {
    x:80, y:225,
    attrs:   ['-int id','-Date fechaCreacion','-String estado'],
    methods: ['+agregar() void','+calcularTotal() double','+convertirEnPedido() void']
  },
  DetalleProducto: {
    x:490, y:400,
    isAbstract: true,
    attrs:   ['-int cantidad','-double precioUnitario'],
    methods: ['+calcularSubtotal() double']
  },
  ItemCarrito: {
    x:245, y:580,
    attrs:   ['-int id'],
    methods: []
  },
  Producto: {
    x:490, y:720,
    attrs:   ['-int id','-String denominacion','-double precioUnitario','-int stock'],
    methods: ['+verificarStock() boolean','+actualizarStock() void']
  },
  Proveedor: {
    x:860, y:720,
    attrs:   ['-int id','-String nombre','-String contacto','-String telefono'],
    methods: []
  },
  Pedido: {
    x:900, y:225,
    attrs:   ['-int id','-Date fechaRealizacion','-String estado','-double total'],
    methods: ['+confirmar() void','+cancelar() void','+calcularTotal() double']
  },
  LineaPedido: {
    x:740, y:580,
    attrs:   ['-int id','-double subtotal'],
    methods: []
  },
  Envio: {
    x:1155, y:225,
    attrs:   ['-int id','-Date fechaEnvio','-String compania','-String numeroSeguimiento'],
    methods: ['+actualizarEstado() void']
  },
  Pago: {
    x:1155, y:440,
    attrs:   ['-int id','-double monto','-String metodoPago','-String estado'],
    methods: ['+procesar() boolean','+reembolsar() boolean']
  }
};

// type: 'arrow' | 'composition' | 'inheritance' | 'assoc'
// for inheritance: from=parent, to=child  (line drawn child→parent, triangle at parent)
// for composition: from=whole/owner,  to=part  (diamond at from, arrow at to)
const CONNECTIONS = [
  { id:'c1',  from:'Cliente',        to:'Direccion',      type:'arrow',       fromMul:'1', toMul:'0..*', label:'tiene',      revealAt:1 },
  { id:'c2',  from:'Cliente',        to:'Carrito_compra', type:'arrow',       fromMul:'1', toMul:'0..*', label:'crea',       revealAt:2 },
  { id:'c3',  from:'Cliente',        to:'Pedido',         type:'arrow',       fromMul:'1', toMul:'0..*', label:'realiza',    revealAt:7 },
  { id:'c4',  from:'Carrito_compra', to:'ItemCarrito',    type:'composition', fromMul:'1', toMul:'1..*', label:'contiene',   revealAt:4 },
  { id:'c5',  from:'DetalleProducto',to:'ItemCarrito',    type:'inheritance',                                                revealAt:4 },
  { id:'c6',  from:'DetalleProducto',to:'LineaPedido',    type:'inheritance',                                                revealAt:8 },
  { id:'c7',  from:'ItemCarrito',    to:'Producto',       type:'arrow',       fromMul:'0..*',toMul:'1',  label:'referencia', revealAt:5 },
  { id:'c8',  from:'LineaPedido',    to:'Producto',       type:'arrow',       fromMul:'0..*',toMul:'1',  label:'referencia', revealAt:8 },
  { id:'c9',  from:'Pedido',         to:'LineaPedido',    type:'composition', fromMul:'1', toMul:'1..*', label:'incluye',    revealAt:8 },
  { id:'c10', from:'Pedido',         to:'Envio',          type:'composition', fromMul:'1', toMul:'0..1', label:'genera',     revealAt:9 },
  { id:'c11', from:'Pedido',         to:'Pago',           type:'arrow',       fromMul:'1', toMul:'1..*', label:'procesa',    revealAt:10 },
  { id:'c12', from:'Envio',          to:'Direccion',      type:'arrow',                                   label:'entrega',    revealAt:9 },
  { id:'c13', from:'Producto',       to:'Proveedor',      type:'assoc',       fromMul:'0..*',toMul:'0..*',label:'suministra', revealAt:6 }
];

const STEPS = [
  {
    id:'Cliente', title:'Cliente', concept:'Entidad Principal',
    desc:'Todo sistema comienza con el usuario. El Cliente es el actor central que interactua con todas las funcionalidades, desde el registro hasta la compra final.',
    points:['Almacena credenciales de autenticacion','Gestiona multiples direcciones de envio','Mantiene historial de carritos y pedidos','Puede actualizar su perfil en cualquier momento'],
    rels:['1:N Direccion','1:N Carrito_compra','1:N Pedido']
  },
  {
    id:'Direccion', title:'Direccion', concept:'Entidad de Soporte',

/* ══════════════════════════════════════════════
   STATE
══════════════════════════════════════════════ */
let currentStep = 0;
let mode = 'presentation';
let scale = 0.78, tx = 90, ty = 55;
let boxData = {};  // {name: {x,y,w,h}}
let smoothTransition = false;

/* ══════════════════════════════════════════════
   RENDER CLASS BOXES
══════════════════════════════════════════════ */
function renderClasses() {
  const canvas = document.getElementById('canvas');
  for (const [name, d] of Object.entries(CLASSES)) {
    const box = document.createElement('div');
    box.className = 'class-box' + (d.isAbstract ? ' abstract' : '');
    box.id = 'box-' + name;
    box.style.left = d.x + 'px';
    box.style.top  = d.y + 'px';

    let html = '<div class="class-header">';
    if (d.isAbstract) html += '<span class="class-stereotype">&laquo;abstract&raquo;</span>';
    html += `<div class="class-name">${name.replace('_',' ')}</div></div>`;

    if (d.attrs.length) {
      html += '<div class="class-section">';
      d.attrs.forEach(a => { html += `<div class="class-member">${a}</div>`; });
      html += '</div>';
    }
    if (d.methods.length) {
      html += '<div class="class-section">';
      d.methods.forEach(m => { html += `<div class="class-member is-method">${m}</div>`; });
      html += '</div>';
    }

    box.innerHTML = html;
    canvas.appendChild(box);
  }
}

/* ══════════════════════════════════════════════
   MEASURE BOXES (after layout)
══════════════════════════════════════════════ */
function measureBoxes() {
  for (const name of Object.keys(CLASSES)) {
    const el = document.getElementById('box-' + name);
    if (!el) continue;
    boxData[name] = {
      x: CLASSES[name].x,
      y: CLASSES[name].y,
      w: el.offsetWidth,
      h: el.offsetHeight
    };
  }
}

/* ══════════════════════════════════════════════
   EDGE POINT (box boundary toward target)
══════════════════════════════════════════════ */
function edge(srcName, tgtName) {
  const s = boxData[srcName], t = boxData[tgtName];
  if (!s || !t) return {x:0,y:0};
  const scx = s.x + s.w/2, scy = s.y + s.h/2;
  const tcx = t.x + t.w/2, tcy = t.y + t.h/2;
  const dx = tcx - scx, dy = tcy - scy;
  if (!dx && !dy) return {x:scx,y:scy};
  const hw = s.w/2, hh = s.h/2;
  if (Math.abs(dx)/hw >= Math.abs(dy)/hh) {
    const sx = dx>0 ? scx+hw : scx-hw;
    return {x:sx, y:scy + dy*(hw/Math.abs(dx))};
  } else {
    const sy = dy>0 ? scy+hh : scy-hh;
    return {x:scx + dx*(hh/Math.abs(dy)), y:sy};
  }
}

/* ══════════════════════════════════════════════
   DRAW CONNECTIONS
══════════════════════════════════════════════ */
function svgEl(tag, attrs={}) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for (const [k,v] of Object.entries(attrs)) el.setAttribute(k, v);
  return el;
}

function drawConnections() {
  const svg = document.getElementById('svg-layer');
  svg.querySelectorAll('.conn').forEach(e => e.remove());

  for (const c of CONNECTIONS) {
    const g = svgEl('g');
    g.classList.add('conn');
    g.id = 'conn-' + c.id;
    g.style.opacity = '0';
    g.style.transition = 'opacity 0.5s ease';

    let p1, p2;
    if (c.type === 'inheritance') {
      // draw from child to parent; triangle at parent (markerEnd)
      p1 = edge(c.to,   c.from);  // child's edge toward parent
      p2 = edge(c.from, c.to);    // parent's edge toward child
    } else {
      p1 = edge(c.from, c.to);
      p2 = edge(c.to,   c.from);
    }

    const line = svgEl('line', {
      x1:p1.x, y1:p1.y, x2:p2.x, y2:p2.y,
      stroke:'#c49a38', 'stroke-width':'1.5'
    });

    if (c.type === 'inheritance') {
      line.setAttribute('marker-end', 'url(#m-inherit)');
    } else if (c.type === 'composition') {
      line.setAttribute('marker-start', 'url(#m-diamond)');
      line.setAttribute('marker-end',   'url(#m-arrow)');
    } else if (c.type === 'arrow') {
      line.setAttribute('marker-end', 'url(#m-arrow)');
    }
    // assoc: no markers
    if (c.type === 'assoc') {
      line.setAttribute('stroke-dasharray', '4 3');
    }

    g.appendChild(line);

    // Mid-label
    const mx = (p1.x+p2.x)/2, my = (p1.y+p2.y)/2;
    if (c.label) {
      // Slight perpendicular offset
      const dx = p2.x-p1.x, dy = p2.y-p1.y;
      const len = Math.sqrt(dx*dx+dy*dy)||1;
      const ox = -dy/len*8, oy = dx/len*8;
      const lbl = svgEl('text', {
        x: mx+ox, y: my+oy,
        'text-anchor':'middle',
        fill:'#555570',
        'font-family':'IBM Plex Mono, monospace',
        'font-size':'9',
        'font-style':'italic'
      });
      lbl.textContent = c.label;
      g.appendChild(lbl);
    }

    // Multiplicity at source (10% along line)
    if (c.fromMul) {
      const t1 = svgEl('text', {
        x: p1.x+(p2.x-p1.x)*0.12, y: p1.y+(p2.y-p1.y)*0.12-5,
        'text-anchor':'middle', fill:'#555570',
        'font-family':'IBM Plex Mono, monospace', 'font-size':'8'
      });
      t1.textContent = c.fromMul;
      g.appendChild(t1);
    }
    // Multiplicity at target (88% along line)
    if (c.toMul) {
      const t2 = svgEl('text', {
        x: p1.x+(p2.x-p1.x)*0.88, y: p1.y+(p2.y-p1.y)*0.88-5,
        'text-anchor':'middle', fill:'#555570',
        'font-family':'IBM Plex Mono, monospace', 'font-size':'8'
      });
      t2.textContent = c.toMul;
      g.appendChild(t2);
    }

    svg.appendChild(g);
  }
}

/* ══════════════════════════════════════════════
   UPDATE TRANSFORM
══════════════════════════════════════════════ */
function applyTransform(animate=false) {
  const canvas = document.getElementById('canvas');
  canvas.style.transition = animate ? 'transform 0.7s cubic-bezier(0.16,1,0.3,1)' : 'none';
  canvas.style.transform  = `translate(${tx}px,${ty}px) scale(${scale})`;
}

/* ══════════════════════════════════════════════
   CENTER ON CLASS
══════════════════════════════════════════════ */
function centerOnClass(name, animate=true) {
  const b = boxData[name];
  if (!b) return;
  const vw = window.innerWidth, vh = window.innerHeight;
  const panelW = 22 + 350 + 20; // left + panel + gap
  const cx = b.x + b.w/2, cy = b.y + b.h/2;
  const targetScale = 1.05;
  const visLeft = panelW;
  const screenCx = visLeft + (vw - visLeft) / 2;
  const screenCy = vh / 2;
  tx = screenCx - cx * targetScale;
  ty = screenCy - cy * targetScale;
  scale = targetScale;
  applyTransform(animate);
}

/* ══════════════════════════════════════════════
   UPDATE PANEL & CONTROLS
══════════════════════════════════════════════ */
function updateUI() {
  const s = STEPS[currentStep];

  document.getElementById('pNum').textContent = String(currentStep+1).padStart(2,'0');
  document.getElementById('pConcept').textContent = s.concept;
  document.getElementById('pStepOf').textContent = `Paso ${currentStep+1} de ${STEPS.length}`;

  // Animate content
  const pc = document.getElementById('panel-content');
  pc.classList.remove('panel-anim');
  void pc.offsetWidth;
  pc.classList.add('panel-anim');

  document.getElementById('pTitle').textContent = s.title;
  document.getElementById('pDesc').textContent = s.desc;
  document.getElementById('pPoints').innerHTML = s.points.map(p=>`<li>${p}</li>`).join('');

  const ra = document.getElementById('pRelArea');
  if (s.rels && s.rels.length) {
    document.getElementById('pRelChips').innerHTML = s.rels.map(r=>`<span class="rel-chip">${r}</span>`).join('');
    ra.style.display = 'block';
  } else {
    ra.style.display = 'none';
  }

  // Controls
  document.getElementById('ctrlCount').textContent =
    `${String(currentStep+1).padStart(2,'0')} / ${String(STEPS.length).padStart(2,'0')}`;
  document.getElementById('ctrlName').textContent = s.title;
  document.getElementById('ctrlFill').style.width = ((currentStep+1)/STEPS.length*100) + '%';
  document.getElementById('btnPrev').disabled = currentStep === 0;
  document.getElementById('btnNext').disabled = currentStep === STEPS.length-1;
}

/* ══════════════════════════════════════════════
   UPDATE DIAGRAM
══════════════════════════════════════════════ */
function updateDiagram() {
  if (mode === 'free') {
    Object.keys(CLASSES).forEach(n => {
      const b = document.getElementById('box-'+n);
      b.className = 'class-box' + (CLASSES[n].isAbstract?' abstract':'') + ' visible';
    });
    CONNECTIONS.forEach(c => {
      const g = document.getElementById('conn-'+c.id);
      if (g) g.style.opacity = '1';
    });
    return;
  }

  // Presentation mode
  const revealed = new Set(STEPS.slice(0, currentStep+1).map(s=>s.id));
  const active   = STEPS[currentStep].id;

  Object.keys(CLASSES).forEach(n => {
    const b = document.getElementById('box-'+n);
    const base = 'class-box' + (CLASSES[n].isAbstract?' abstract':'');
    if (n === active)        b.className = base + ' visible active';
    else if (revealed.has(n)) b.className = base + ' visible revealed';
    else                     b.className = base;
  });

  CONNECTIONS.forEach(c => {
    const g = document.getElementById('conn-'+c.id);
    if (!g) return;
    if (c.revealAt <= currentStep) {
      g.style.opacity = c.revealAt === currentStep ? '1' : '0.2';
    } else {
      g.style.opacity = '0';
    }
  });
}

/* ══════════════════════════════════════════════
   NAVIGATION
══════════════════════════════════════════════ */
function goToStep(s, animate=true) {
  currentStep = Math.max(0, Math.min(STEPS.length-1, s));
  updateUI();
  updateDiagram();
  if (mode === 'presentation') centerOnClass(STEPS[currentStep].id, animate);
}

window.nextStep = () => goToStep(currentStep+1);
window.prevStep = () => goToStep(currentStep-1);

/* ══════════════════════════════════════════════
   MODE TOGGLE
══════════════════════════════════════════════ */
function setMode(m) {
  mode = m;
  const pres = m === 'presentation';
  document.getElementById('btnPres').classList.toggle('on',  pres);
  document.getElementById('btnFree').classList.toggle('on', !pres);
  document.getElementById('panel').classList.toggle('hidden', !pres);
  document.getElementById('controls').style.opacity = pres ? '1' : '0.5';
  document.getElementById('viewport').classList.toggle('pannable', !pres);

  if (!pres) {
    updateDiagram();
    scale = 0.68; tx = 30; ty = 30;
    applyTransform(true);
  } else {
    updateDiagram();
    centerOnClass(STEPS[currentStep].id, true);
  }
}
window.setMode = setMode;

/* ══════════════════════════════════════════════
   PAN & ZOOM (free mode)
══════════════════════════════════════════════ */
let panning = false, px0=0, py0=0, tx0=0, ty0=0;

document.getElementById('viewport').addEventListener('mousedown', e => {
  if (mode !== 'free') return;
  panning = true;
  px0 = e.clientX; py0 = e.clientY; tx0 = tx; ty0 = ty;
  document.getElementById('viewport').classList.add('panning');
});
document.addEventListener('mousemove', e => {
  if (!panning) return;
  tx = tx0 + (e.clientX - px0);
  ty = ty0 + (e.clientY - py0);
  applyTransform(false);
});
document.addEventListener('mouseup', () => {
  panning = false;
  document.getElementById('viewport').classList.remove('panning');
});
document.getElementById('viewport').addEventListener('wheel', e => {
  if (mode !== 'free') return;
  e.preventDefault();
  const factor = e.deltaY > 0 ? 0.9 : 1.1;
  const ns = Math.min(Math.max(scale*factor, 0.2), 3);
  const r = document.getElementById('viewport').getBoundingClientRect();
  const mx = e.clientX - r.left, my = e.clientY - r.top;
  tx = mx - (mx - tx)*(ns/scale);
  ty = my - (my - ty)*(ns/scale);
  scale = ns;
  applyTransform(false);
}, {passive:false});

/* ══════════════════════════════════════════════
   KEYBOARD
══════════════════════════════════════════════ */
document.addEventListener('keydown', e => {
  if (mode !== 'presentation') return;
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextStep(); }
  else if (e.key === 'ArrowLeft') { e.preventDefault(); prevStep(); }
  else if (e.key === 'Escape') setMode('free');
});

/* ══════════════════════════════════════════════
   INIT
══════════════════════════════════════════════ */
renderClasses();
applyTransform(false);

setTimeout(() => {
  measureBoxes();
  drawConnections();
  goToStep(0, false);
}, 80);
</script>
